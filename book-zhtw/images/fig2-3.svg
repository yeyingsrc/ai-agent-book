<rect x="388" y="210" width="300" height="50" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="538" y="235" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Agent 框架並行執行兩個工具</text>
<line x1="538" y1="260" x2="538" y2="298" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<text x="30" y="286" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">第二次呼叫</text>
<rect x="388" y="300" width="300" height="78" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="538" y="322" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">messages: + tool 結果</text>
<text x="538" y="346" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">溫哥華時間 &amp; 天氣</text>
<text x="538" y="364" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">追加到訊息歷史</text>
